<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter</title>
  <meta name="description" content="Convert temperatures accurately between Celsius, Fahrenheit and Kelvin." />

  <!-- Google Font: Manrope -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="page">
    <div class="card" role="main" aria-labelledby="app-title">

      <!-- ============ HEADER ============ -->
      <header class="header">
        <div class="header__icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 14.76V3.5a2 2 0 0 0-4 0v11.26a4 4 0 1 0 4 0Z" stroke="#2563EB" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="17" r="1.6" fill="#2563EB"/>
          </svg>
        </div>
        <h1 class="header__title" id="app-title">Temperature Converter</h1>
        <p class="header__subtitle">Convert temperatures accurately between Celsius, Fahrenheit and Kelvin.</p>
      </header>

      <!-- ============ FORM ============ -->
      <form class="form" id="converter-form" novalidate>

        <!-- Input section -->
        <div class="field">
          <label for="temperature-input" class="field__label">Temperature</label>
          <input
            type="text"
            inputmode="decimal"
            id="temperature-input"
            class="field__input"
            placeholder="Enter Temperature"
            aria-describedby="input-hint"
            autocomplete="off"
          />
          <p class="field__hint" id="input-hint">Numbers only. Decimals are supported.</p>
        </div>

        <!-- Unit selector -->
        <div class="field">
          <label for="unit-select" class="field__label">From unit</label>
          <div class="select-wrapper">
            <select id="unit-select" class="field__select">
              <option value="celsius" selected>Celsius (°C)</option>
              <option value="fahrenheit">Fahrenheit (°F)</option>
              <option value="kelvin">Kelvin (K)</option>
            </select>
            <svg class="select-wrapper__chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M4 6l4 4 4-4" stroke="#6B7280" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

        <!-- Validation / error message -->
        <div class="message message--error" id="error-message" role="alert" aria-live="assertive" hidden>
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="8" stroke="#DC2626" stroke-width="1.6"/>
            <path d="M10 6.5v4" stroke="#DC2626" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="10" cy="13.2" r="0.9" fill="#DC2626"/>
          </svg>
          <span id="error-message-text"></span>
        </div>

        <!-- Buttons -->
        <div class="actions">
          <button type="submit" class="btn btn--primary" id="convert-btn">
            <span class="btn__label">Convert</span>
            <span class="btn__spinner" aria-hidden="true"></span>
          </button>
          <button type="button" class="btn btn--secondary" id="reset-btn">Reset</button>
        </div>
      </form>

      <!-- ============ RESULTS ============ -->
      <section class="results" id="results-section" aria-live="polite" hidden>
        <div class="results__header">
          <h2 class="results__title">Results</h2>
          <button type="button" class="copy-btn" id="copy-btn" aria-label="Copy results to clipboard">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <rect x="5.5" y="5.5" width="8" height="8" rx="1.5" stroke="#6B7280" stroke-width="1.4"/>
              <path d="M3.5 10.5h-1a1 1 0 0 1-1-1v-6a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v1" stroke="#6B7280" stroke-width="1.4"/>
            </svg>
            <span id="copy-btn-label">Copy</span>
          </button>
        </div>

        <div class="results__grid">
          <div class="result-card" id="card-celsius">
            <span class="result-card__label">Celsius</span>
            <span class="result-card__value"><span id="value-celsius">—</span>&nbsp;°C</span>
          </div>
          <div class="result-card" id="card-fahrenheit">
            <span class="result-card__label">Fahrenheit</span>
            <span class="result-card__value"><span id="value-fahrenheit">—</span>&nbsp;°F</span>
          </div>
          <div class="result-card" id="card-kelvin">
            <span class="result-card__label">Kelvin</span>
            <span class="result-card__value"><span id="value-kelvin">—</span>&nbsp;K</span>
          </div>
        </div>
      </section>

    </div>

    <p class="footnote">Designed & Developed by Natasha Ikram</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
